# TODO: Gate behind feature flag ohai.redis.otel_integration when available
relationships:
  # OHI: Host measures Redis instance via reportingAgent
  - name: hostHostsRedisinstance
    version: "1"
    origins:
      - OnHost Integration
    conditions:
      - attribute: eventType
        anyOf: [ "RedisSample" ]
      - attribute: nr.entityType
        anyOf: ["REDISINSTANCE"]
      - attribute: reportingAgent
        present: true
      - attribute: clusterName # condition to exclude k8s hosts
        present: false
      - attribute: podName
        present: false
    relationship:
      expires: PT75M
      relationshipType: MEASURES
      source:
        buildGuid:
          account:
            attribute: accountId
          domain:
            value: INFRA
          type:
            value: HOST
            valueInGuid: NA
          identifier:
            fragments:
              - attribute: reportingAgent # cloudproviderID
            hashAlgorithm: FARM_HASH
      target:
        extractGuid:
          attribute: entityGuid
          entityType:
            value: REDISINSTANCE

  # OHI: Host measures Redis instance via fullHostname
  - name: hostHostsRedisinstanceRule2
    version: "1"
    origins:
      - OnHost Integration
    conditions:
      - attribute: eventType
        anyOf: [ "RedisSample" ]
      - attribute: nr.entityType
        anyOf: ["REDISINSTANCE"]
      - attribute: fullHostname
        present: true
      - attribute: reportingAgent
        present: false
      - attribute: clusterName # condition to exclude k8s hosts
        present: false
      - attribute: podName
        present: false
    relationship:
      expires: PT75M
      relationshipType: MEASURES
      source:
        buildGuid:
          account:
            attribute: accountId
          domain:
            value: INFRA
          type:
            value: HOST
            valueInGuid: NA
          identifier:
            fragments:
              - attribute: fullHostname
            hashAlgorithm: FARM_HASH
      target:
        extractGuid:
          attribute: entityGuid
          entityType:
            value: REDISINSTANCE

  # OpenTelemetry: Host contains Redis instance (via host.id)
  - name: hostContainsOtelRedisinstance
    version: "1"
    origins:
      - OpenTelemetry
    conditions:
      - attribute: eventType
        anyOf: [ "Metric" ]
      - attribute: metricName
        startsWith: redis.
      - attribute: instrumentation.provider
        anyOf: [ "opentelemetry" ]
      - attribute: host.id
        present: true
      - attribute: k8s.pod.name # condition to exclude k8s pod based hosts
        present: false
    relationship:
      expires: PT75M
      relationshipType: HOSTS
      source:
        buildGuid:
          account:
            attribute: accountId
          domain:
            value: INFRA
          type:
            value: HOST
            valueInGuid: NA
          identifier:
            fragments:
              - attribute: host.id
            hashAlgorithm: FARM_HASH
      target:
        extractGuid:
          attribute: entity.guid
          entityType:
            value: REDISINSTANCE

  # OpenTelemetry: Host contains Redis instance (via host.name when host.id absent)
  - name: hostContainsOtelRedisinstanceByHostName
    version: "1"
    origins:
      - OpenTelemetry
    conditions:
      - attribute: eventType
        anyOf: [ "Metric" ]
      - attribute: metricName
        startsWith: redis.
      - attribute: instrumentation.provider
        anyOf: [ "opentelemetry" ]
      - attribute: host.name
        present: true
      - attribute: host.id
        present: false
      - attribute: k8s.pod.name # condition to exclude k8s pod based hosts
        present: false
    relationship:
      expires: PT75M
      relationshipType: HOSTS
      source:
        buildGuid:
          account:
            attribute: accountId
          domain:
            value: INFRA
          type:
            value: HOST
            valueInGuid: NA
          identifier:
            fragments:
              - attribute: host.name
            hashAlgorithm: FARM_HASH
      target:
        extractGuid:
          attribute: entity.guid
          entityType:
            value: REDISINSTANCE
